<!DOCTYPE html>
<html lang="en" class="dark" th:fragment = "parent(content,title,script)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">SCM</title>
    <link rel="stylesheet" data-th-href="@{'/css/output.css'}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="w-full dark:bg-gray-900 dark:text-white">
    <!-- common header -->
    <div data-th-replace="navbar :: navbar">

    </div>
    <!-- main content -->
    <div class="p-4 h-screen">
    <section th:replace="${content}"></section>
</div>
    <!-- common footer -->

    <!-- flow bite content -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <th:block data-th-replace="${script}"></th:block>
</body>
</html>
